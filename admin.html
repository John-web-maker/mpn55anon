<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin | MPN55</title>
    <style>
        body { display: none; background: #1a2530; color: #ecf0f1; font-family: 'Segoe UI', sans-serif; padding: 20px; margin: 0; min-height: 100vh; }
        h1 { text-align: center; text-transform: uppercase; font-size: 1.3em; margin-bottom: 20px; }
        #dashboardList { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 10px; }
        .student-box { background: rgba(255, 255, 255, 0.05); border-radius: 10px; padding: 15px; border: 1px solid rgba(255, 255, 255, 0.1); text-align: center; cursor: pointer; font-size: 0.75em; font-weight: bold; line-height: 1.3; }
        #inboxView { display: none; }
        .back-btn { background: #34495e; border: none; border-radius: 8px; color: #ecf0f1; padding: 10px 20px; cursor: pointer; margin-bottom: 20px; }
        .envelope-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)); gap: 15px; }
        .css-env { position: relative; width: 100%; padding-top: 75%; border-radius: 8px; box-shadow: 0 5px 15px rgba(0,0,0,0.4); overflow: hidden; }
        .env-icon { position: absolute; font-size: 1.8rem; z-index: 2; top: 50%; left: 50%; transform: translate(-50%, -10%); }
        .t-netral { background-color: #d4b895; } .t-cinta { background-color: #ffb6c1; } .t-marah { background-color: #2c3e50; border: 1px solid #e74c3c; } .t-api { background: linear-gradient(135deg, #ff416c, #ff4b2b); } .t-sahabat { background-color: #fde047; }
        #letterViewer { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 100; justify-content: center; align-items: center; background: rgba(0,0,0,0.9); backdrop-filter: blur(5px); }
        .letter-paper { background-color: #fdfbf7; color: #2c3e50; border-radius: 10px; padding: 25px; width: 85%; max-width: 450px; max-height: 85vh; overflow-y: auto; position: relative; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .close-btn { position: absolute; top: 10px; right: 15px; font-size: 1.5em; cursor: pointer; }
        /* INI FIX GAMBAR MELEDAKNYA BRO */
        .letter-attachment { 
            margin-top: 15px; 
            width: 100%; 
            max-height: 350px; /* Kunci tingginya di sini */
            object-fit: contain; /* Biar gak gepeng */
            border: 4px solid white; 
            box-shadow: 0 2px 5px rgba(0,0,0,0.2); 
            background: #eee;
        }
        .logout-btn { background: #e74c3c; color: white; border: none; padding: 8px 12px; border-radius: 5px; float: right; font-size: 0.8em; }
    </style>
</head>
<body>
    <button class="logout-btn" id="logoutBtn">Logout</button>
    <h1>MPN55 ADMIN</h1>
    <div id="dashboardList"></div>
    <div id="inboxView">
        <button class="back-btn" onclick="tutupInbox()">← Back</button>
        <h2 id="inboxTitle" style="text-align: center; font-size: 1em;"></h2>
        <div class="envelope-grid" id="envelopeGrid"></div>
    </div>
    <div id="letterViewer">
        <div class="letter-paper">
            <span class="close-btn" onclick="tutupSurat()">✖</span>
            <p style="font-size: 0.9em;"><b>Dari:</b> <span id="suratDari"></span></p>
            <p id="suratIsi" style="white-space: pre-wrap; font-size: 1em; line-height: 1.4;"></p>
            <img src="" id="suratGambar" class="letter-attachment" style="display:none">
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-auth.js";
        import { getFirestore, collection, query, where, getDocs } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBXsyqAMRvAXoWx8hR18vPQS1qnfzDY-9o",
            authDomain: "infinite-blade-472912-b2.firebaseapp.com",
            projectId: "infinite-blade-472912-b2",
            storageBucket: "infinite-blade-472912-b2.firebasestorage.app",
            messagingSenderId: "298780022614",
            appId: "1:298780022614:web:b0e454c7b58e36134ca8f7"
        };
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        onAuthStateChanged(auth, (user) => {
            if (!user) { window.location.href = "index.html"; } 
            else { document.body.style.display = "block"; }
        });

        const names = ["ADHIATAMA DWIKA NUGRAHA", "AFFANI HAYU PRABANINGTYAS", "AMELIA AMRETHA CANDRA", "ANDI PANGERAN MAULANA IBRAHIM", "ARIN VANIA INDRIATI WIDODO", "BANA HIBRIZI NAFIUDIN", "DIAZ AGUNG FATAHILLAH", "DIFNA AULYA SYAFITRI", "FERNANDA PRIMA YUDHA", "GABRIELA HAMIDA PUTRI", "HANS YURI CARNAGI GINTING", "JOANELVI SHANNOEL", "TANDELOKA DESTARA YUDHA", "MEIVA ANASTASYA BR GINTING", "MOCH. AMIL LABIB MAKARIM", "MUHAMMAD RIFQI RASYIDDIN", "NI MADE AUDY ANGELINA SUDARSANA", "NIZAR EKA MATALIPUTRI", "PUTRI SATRIA WIBAWA PANGARIBUAN", "RAIHAN ARYA RIDHAWAN", "RISCHA SITANGGANG", "RIZAL YEPTA PUTRA SIBARANI", "RONI NUR HIDAYAT", "SHERLYANA FITRIA DESWANTARI", "TOTTI ARIIQ RACHYANDY", "YOINA DOVERIANINGTYAS PARDOSI"];

        function renderDashboard() {
            const list = document.getElementById('dashboardList');
            names.forEach(n => {
                const box = document.createElement('div');
                box.className = 'student-box';
                box.innerHTML = n;
                box.onclick = () => bukaInbox(n);
                list.appendChild(box);
            });
        }
        renderDashboard();

        window.bukaInbox = async (nama) => {
            document.getElementById('dashboardList').style.display = 'none';
            document.getElementById('inboxView').style.display = 'block';
            document.getElementById('inboxTitle').innerText = nama;
            const grid = document.getElementById('envelopeGrid');
            grid.innerHTML = "Loading...";
            const q = query(collection(db, "surat_kelas"), where("tujuan", "==", nama));
            const snap = await getDocs(q);
            grid.innerHTML = snap.empty ? "Kosong." : "";
            snap.forEach(doc => {
                const d = doc.data();
                const div = document.createElement('div');
                let cls = 't-netral'; let ico = '✉️';
                if(d.tema === 'cinta') { cls = 't-cinta'; ico = '💖'; }
                if(d.tema === 'marah') { cls = 't-marah'; ico = '😡'; }
                if(d.tema === 'cinta_api') { cls = 't-api'; ico = '🔥'; }
                if(d.tema === 'sahabat') { cls = 't-sahabat'; ico = '🤝'; }
                div.innerHTML = `<div class="css-env ${cls}"><span class="env-icon">${ico}</span></div>`;
                div.onclick = () => bukaSurat(d);
                grid.appendChild(div);
            });
        };

        window.bukaSurat = (d) => {
            document.getElementById('suratDari').innerText = d.pengirim;
            document.getElementById('suratIsi').innerText = d.isi_pesan;
            const img = document.getElementById('suratGambar');
            if(d.url_gambar) { img.src = d.url_gambar; img.style.display = "block"; }
            else { img.style.display = "none"; }
            document.getElementById('letterViewer').style.display = "flex";
        };
        window.tutupSurat = () => { document.getElementById('letterViewer').style.display = "none"; };
        window.tutupInbox = () => { location.reload(); };
        document.getElementById('logoutBtn').onclick = () => { signOut(auth); };
    </script>
</body>
</html>
