<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Class Anonymfess | Admin Dashboard</title>
    <style>
        body, html {
            height: 100%; margin: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: radial-gradient(circle, #2d3e50 0%, #1a2530 100%);
            color: #ecf0f1; padding: 20px; box-sizing: border-box; overflow-x: hidden;
        }
        h1 { font-size: 1.8em; margin-bottom: 25px; text-transform: uppercase; color: #ecf0f1; text-align: center;}
        
        #dashboardList {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 15px; margin-bottom: 30px;
        }
        .student-box {
            background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(10px);
            border-radius: 12px; padding: 20px; border: 1px solid rgba(255, 255, 255, 0.1);
            text-align: center; cursor: pointer; transition: transform 0.3s, background 0.3s;
        }
        .student-box:hover { transform: translateY(-5px); background: rgba(255, 255, 255, 0.1); }
        .student-name { font-weight: 600; color: #ecf0f1; font-size: 1.1em;}

        #inboxView { display: none; } 
        .back-btn {
            background: rgba(255, 255, 255, 0.1); border: none; border-radius: 8px;
            color: #ecf0f1; padding: 10px 20px; cursor: pointer; margin-bottom: 20px; transition: background 0.3s;
        }
        .back-btn:hover { background: rgba(255, 255, 255, 0.2); }
        
        /* Grid Amplop Murni CSS */
        .envelope-grid {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 20px;
            margin-top: 20px; transition: filter 0.5s ease;
        }
        .envelope-item {
            cursor: pointer; transition: transform 0.3s; perspective: 1000px;
        }
        .envelope-item:hover { transform: translateY(-10px) scale(1.05); }

        .css-env {
            position: relative; width: 100%; padding-top: 75%; border-radius: 8px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.4); overflow: hidden;
        }
        .css-env::before { 
            content: ''; position: absolute; top: 0; left: 0; right: 0; bottom: 0;
            background: linear-gradient(135deg, rgba(255,255,255,0.3) 0%, rgba(0,0,0,0.1) 100%);
            clip-path: polygon(0 0, 100% 0, 50% 50%); z-index: 1;
        }
        .env-icon {
            position: absolute; font-size: 3rem; z-index: 2;
            top: 50%; left: 50%; transform: translate(-50%, -10%);
        }
        /* Warna 5 Tema PURE CSS */
        .t-netral { background-color: #d4b895; }
        .t-cinta { background-color: #ffb6c1; }
        .t-marah { background-color: #2c3e50; border: 2px solid #e74c3c; box-sizing: border-box;}
        .t-api { background: linear-gradient(135deg, #ff416c, #ff4b2b); }
        .t-sahabat { background-color: #fde047; }

        .blur-active { filter: blur(15px); pointer-events: none; } 
        #letterViewer {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 100; justify-content: center; align-items: center;
        }
        .letter-paper {
            background-color: #fdfbf7; color: #2c3e50; border-radius: 10px;
            padding: 40px; width: 90%; max-width: 500px; max-height: 80vh; overflow-y: auto;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5); position: relative;
            transform: translateY(100vh); opacity: 0; transition: all 0.6s cubic-bezier(0.68, -0.55, 0.265, 1.55);
        }
        .letter-paper.open { transform: translateY(0); opacity: 1; }
        .close-btn {
            position: absolute; top: 15px; right: 20px; font-size: 1.5em;
            cursor: pointer; color: #7f8c8d; transition: color 0.3s;
        }
        .close-btn:hover { color: #e74c3c; }
        .letter-header { margin-bottom: 20px; border-bottom: 1px solid #bdc3c7; padding-bottom: 10px;}
        .letter-from { font-weight: bold; font-size: 1.2em; color: #e74c3c;}
        .letter-date { font-size: 0.8em; color: #7f8c8d; display: block; margin-top: 5px;}
        .letter-content { font-size: 1.1em; line-height: 1.6; white-space: pre-wrap; }
        
        .letter-attachment {
            margin-top: 20px; width: 100%; border: 10px solid white; border-bottom: 40px solid white;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2); box-sizing: border-box; background-color: white;
            display: none;
        }
    </style>
</head>
<body>
    <h1>Class Anonymfess | Admin Dashboard</h1>
    <div id="dashboardList"></div>
    <div id="inboxView">
        <button class="back-btn" onclick="tutupInbox()">← Kembali ke Dashboard</button>
        <h2 id="inboxTitle" style="text-align: center;">Kotak Surat</h2>
        <div class="envelope-grid" id="envelopeGrid"></div>
    </div>
    <div id="letterViewer">
        <div class="letter-paper" id="letterPaper">
            <span class="close-btn" onclick="tutupSurat()">✖</span>
            <div class="letter-header">
                <span style="color: #7f8c8d;">Dari: </span><span class="letter-from" id="suratDari"></span>
                <span class="letter-date" id="suratWaktu"></span>
            </div>
            <div class="letter-content" id="suratIsi"></div>
            <img src="" id="suratGambar" class="letter-attachment" alt="Lampiran">
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
        import { getFirestore, collection, query, where, getDocs } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBXsyqAMRvAXoWx8hR18vPQS1qnfzDY-9o",
            authDomain: "infinite-blade-472912-b2.firebaseapp.com",
            projectId: "infinite-blade-472912-b2",
            storageBucket: "infinite-blade-472912-b2.firebasestorage.app",
            messagingSenderId: "298780022614",
            appId: "1:298780022614:web:b0e454c7b58e36134ca8f7"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const daftarMahasiswa = ["Andi", "Budi", "Caca", "Deni", "Euis", "Fajar", "Gita", "Hadi", "Intan", "Joko", "Kiki", "Lala", "Maman", "Nina", "Opan", "Putri", "Qori", "Rina", "Siti", "Tono", "Umar", "Vina", "Wira", "Xander", "Yani", "Zaki"];

        function renderDashboard() {
            const dashboard = document.getElementById('dashboardList');
            daftarMahasiswa.forEach(nama => {
                const box = document.createElement('div');
                box.className = 'student-box';
                box.onclick = () => bukaInbox(nama);
                box.innerHTML = `<div class="student-name">${nama}</div>`;
                dashboard.appendChild(box);
            });
        }
        renderDashboard();

        window.bukaInbox = async function(namaTarget) {
            document.getElementById('dashboardList').style.display = 'none';
            document.getElementById('inboxView').style.display = 'block';
            document.getElementById('inboxTitle').innerText = `Kotak Surat - ${namaTarget}`;
            const grid = document.getElementById('envelopeGrid');
            grid.innerHTML = '<p style="text-align: center; color: #a4b0be; grid-column: 1/-1;">Mencari surat...</p>';

            try {
                const q = query(collection(db, "surat_kelas"), where("tujuan", "==", namaTarget));
                const querySnapshot = await getDocs(q);
                grid.innerHTML = ''; 

                if (querySnapshot.empty) {
                    grid.innerHTML = '<p style="text-align: center; color: #a4b0be; grid-column: 1/-1;">Belum ada surat rahasia.</p>';
                    return;
                }

                querySnapshot.forEach((doc) => {
                    const dataSurat = doc.data();
                    const amplopItem = document.createElement('div');
                    amplopItem.className = 'envelope-item';
                    
                    // Logika Nampilin Amplop PURE CSS
                    let temaClass = 't-netral'; let iconTema = '✉️';
                    if(dataSurat.tema === 'cinta') { temaClass = 't-cinta'; iconTema = '💖'; }
                    if(dataSurat.tema === 'marah') { temaClass = 't-marah'; iconTema = '😡'; }
                    if(dataSurat.tema === 'cinta_api') { temaClass = 't-api'; iconTema = '🔥'; }
                    if(dataSurat.tema === 'sahabat') { temaClass = 't-sahabat'; iconTema = '🤝'; }

                    amplopItem.innerHTML = `<div class="css-env ${temaClass}"><span class="env-icon">${iconTema}</span></div>`;
                    amplopItem.onclick = () => bukaSurat(dataSurat);
                    grid.appendChild(amplopItem);
                });
            } catch (error) {
                grid.innerHTML = '<p style="color: red; text-align: center;">Error narik data!</p>';
            }
        };

window.bukaSurat = function(data) {
            document.getElementById('inboxView').classList.add('blur-active');
            document.getElementById('suratDari').innerText = data.pengirim;
            
            let waktuTeks = "Waktu tidak diketahui";
            if(data.waktu) {
                const date = data.waktu.toDate();
                waktuTeks = date.toLocaleString('id-ID');
            }
            document.getElementById('suratWaktu').innerText = waktuTeks;
            document.getElementById('suratIsi').innerText = data.isi_pesan;

            const imgEl = document.getElementById('suratGambar');
            
            // RESET GAMBAR DULU
            imgEl.src = "";
            imgEl.style.display = 'none';

            // CEK APAKAH ADA LINK GAMBAR
            if (data.url_gambar && data.url_gambar !== "") {
                console.log("Mencoba memuat gambar dari:", data.url_gambar);
                imgEl.src = data.url_gambar;
                imgEl.style.display = 'block';
                
                // Tambahin tombol darurat kalau gambar tetep pecah
                const debugBtn = document.createElement('a');
                debugBtn.href = data.url_gambar;
                debugBtn.target = "_blank";
                debugBtn.innerText = "🔗 Klik di sini kalau gambar nggak muncul";
                debugBtn.style = "display:block; font-size:10px; color:blue; margin-top:10px; text-decoration:none;";
                debugBtn.id = "debugLink";
                
                // Hapus link debug lama kalau ada
                const oldLink = document.getElementById('debugLink');
                if(oldLink) oldLink.remove();
                
                imgEl.after(debugBtn);
            }

            const viewer = document.getElementById('letterViewer');
            const paper = document.getElementById('letterPaper');
            viewer.style.display = 'flex';
            setTimeout(() => { paper.classList.add('open'); }, 50);
        };

        window.tutupSurat = function() {
            const paper = document.getElementById('letterPaper');
            paper.classList.remove('open'); 
            document.getElementById('inboxView').classList.remove('blur-active');
            setTimeout(() => { document.getElementById('letterViewer').style.display = 'none'; }, 600); 
        };

        window.tutupInbox = function() {
            document.getElementById('inboxView').style.display = 'none';
            document.getElementById('dashboardList').style.display = 'grid';
        };
    </script>
</body>
</html>
