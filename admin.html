<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kirim Pesan | Anonymfess</title>
    <style>
        body { background: #1a2530; color: white; font-family: sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; padding: 20px; box-sizing: border-box; }
        .box { background: rgba(255,255,255,0.05); padding: 30px; border-radius: 15px; width: 100%; max-width: 400px; backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); }
        h2 { text-align: center; margin-top: 0; text-transform: uppercase; letter-spacing: 2px; }
        label { font-size: 0.8em; color: #a4b0be; display: block; margin-top: 15px; }
        input, textarea, select, button { width: 100%; padding: 12px; margin-top: 5px; border-radius: 8px; border: none; box-sizing: border-box; font-size: 1em; }
        input, textarea, select { background: rgba(255,255,255,0.1); color: white; border: 1px solid rgba(255,255,255,0.1); }
        button { background: #3498db; color: white; font-weight: bold; cursor: pointer; margin-top: 20px; transition: 0.3s; }
        button:hover { background: #2980b9; }
        button:disabled { background: #7f8c8d; cursor: not-allowed; }
        #status { color: #f1c40f; text-align: center; margin-top: 15px; font-size: 0.85em; font-weight: bold; }
    </style>
</head>
<body>
    <div class="box">
        <h2>Tulis Rahasia</h2>
        <form id="fessForm">
            <label>Penerima:</label>
            <select id="tujuan" required>
                <option value="">Pilih Nama Mahasiswa...</option>
                <script>
                    const names = ["Andi", "Budi", "Caca", "Deni", "Euis", "Fajar", "Gita", "Hadi", "Intan", "Joko", "Kiki", "Lala", "Maman", "Nina", "Opan", "Putri", "Qori", "Rina", "Siti", "Tono", "Umar", "Vina", "Wira", "Xander", "Yani", "Zaki"];
                    names.forEach(n => document.write(`<option value="${n}">${n}</option>`));
                </script>
            </select>

            <label>Dari (Nama Bebas):</label>
            <input type="text" id="pengirim" placeholder="Misal: Secret Admirer" required>

            <label>Pesan:</label>
            <textarea id="isi" placeholder="Ketik rahasiamu..." rows="4" required></textarea>

            <label>Lampirkan Foto (Opsional):</label>
            <input type="file" id="gambar" accept="image/*">

            <button type="submit" id="btnKirim">KIRIM SEKARANG 🚀</button>
            <div id="status"></div>
        </form>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
        import { getFirestore, collection, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBXsyqAMRvAXoWx8hR18vPQS1qnfzDY-9o",
            authDomain: "infinite-blade-472912-b2.firebaseapp.com",
            projectId: "infinite-blade-472912-b2",
            storageBucket: "infinite-blade-472912-b2.firebasestorage.app",
            messagingSenderId: "298780022614",
            appId: "1:298780022614:web:b0e454c7b58e36134ca8f7"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const IMGBB_KEY = "69bbdb9d386d1267c8f6a1b0c5791cd0";

        document.getElementById('fessForm').onsubmit = async (e) => {
            e.preventDefault();
            const btn = document.getElementById('btnKirim');
            const stat = document.getElementById('status');
            const fileInput = document.getElementById('gambar');
            
            btn.disabled = true;
            stat.innerText = "⏳ Sedang mengunggah gambar...";

            let finalUrl = "";

            // LOGIKA UPLOAD KE IMGBB
            if (fileInput.files.length > 0) {
                const formData = new FormData();
                formData.append("image", fileInput.files[0]);

                try {
                    const res = await fetch(`https://api.imgbb.com/1/upload?key=${IMGBB_KEY}`, {
                        method: "POST",
                        body: formData
                    });
                    const result = await res.json();
                    
                    if (result.success) {
                        finalUrl = result.data.url; // Ini link gambar asli
                    } else {
                        alert("Gagal Upload Gambar: " + result.error.message);
                    }
                } catch (err) {
                    alert("Koneksi gagal! Pastikan lu udah pake link GitHub (HTTPS).");
                    btn.disabled = false;
                    return;
                }
            }

            // SIMPAN KE FIREBASE
            try {
                stat.innerText = "📩 Menyimpan pesan ke database...";
                await addDoc(collection(db, "surat_kelas"), {
                    tujuan: document.getElementById('tujuan').value,
                    pengirim: document.getElementById('pengirim').value,
                    isi_pesan: document.getElementById('isi').value,
                    tema: "netral",
                    url_gambar: finalUrl,
                    waktu: serverTimestamp()
                });
                alert("BERHASIL! Pesan lu udah meluncur.");
                location.reload();
            } catch (err) {
                alert("Error Firebase: " + err.message);
                btn.disabled = false;
            }
        };
    </script>
</body>
</html>
