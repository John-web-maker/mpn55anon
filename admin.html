<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Class Anonymfess | Admin Dashboard</title>
    <style>
        body, html { height: 100%; margin: 0; font-family: 'Segoe UI', sans-serif; background: radial-gradient(circle, #2d3e50 0%, #1a2530 100%); color: #ecf0f1; padding: 20px; box-sizing: border-box; overflow-x: hidden; }
        h1 { font-size: 1.8em; margin-bottom: 25px; text-transform: uppercase; text-align: center;}
        #dashboardList { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 15px; margin-bottom: 30px; }
        .student-box { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(10px); border-radius: 12px; padding: 20px; border: 1px solid rgba(255, 255, 255, 0.1); text-align: center; cursor: pointer; transition: 0.3s; }
        .student-box:hover { transform: translateY(-5px); background: rgba(255, 255, 255, 0.1); }
        #inboxView { display: none; } 
        .back-btn { background: rgba(255, 255, 255, 0.1); border: none; border-radius: 8px; color: #ecf0f1; padding: 10px 20px; cursor: pointer; margin-bottom: 20px; }
        .envelope-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 20px; margin-top: 20px; }
        .envelope-item { cursor: pointer; transition: 0.3s; perspective: 1000px; }
        .envelope-item:hover { transform: translateY(-10px) scale(1.05); }

        /* CSS AMPLOP DASHBOARD */
        .css-env { position: relative; width: 100%; padding-top: 75%; border-radius: 8px; box-shadow: 0 5px 15px rgba(0,0,0,0.4); overflow: hidden; }
        .css-env::before { content: ''; position: absolute; top: 0; left: 0; right: 0; bottom: 0; background: linear-gradient(135deg, rgba(255,255,255,0.3) 0%, rgba(0,0,0,0.1) 100%); clip-path: polygon(0 0, 100% 0, 50% 50%); z-index: 1; }
        .env-icon { position: absolute; font-size: 3rem; z-index: 2; top: 50%; left: 50%; transform: translate(-50%, -10%); }
        .t-netral { background-color: #d4b895; }
        .t-cinta { background-color: #ffb6c1; }
        .t-marah { background-color: #2c3e50; border: 1px solid #e74c3c; box-sizing: border-box;}
        .t-api { background: linear-gradient(135deg, #ff416c, #ff4b2b); }
        .t-sahabat { background-color: #fde047; }

        /* MODAL SURAT */
        .blur-active { filter: blur(15px); pointer-events: none; } 
        #letterViewer { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 100; justify-content: center; align-items: center; }
        .letter-paper { background-color: #fdfbf7; color: #2c3e50; border-radius: 10px; padding: 40px; width: 90%; max-width: 500px; max-height: 80vh; overflow-y: auto; box-shadow: 0 20px 50px rgba(0,0,0,0.5); position: relative; transform: translateY(100vh); opacity: 0; transition: 0.6s; }
        .letter-paper.open { transform: translateY(0); opacity: 1; }
        .close-btn { position: absolute; top: 15px; right: 20px; font-size: 1.5em; cursor: pointer; color: #7f8c8d; }
        .close-btn:hover { color: #e74c3c; }
        .letter-header { margin-bottom: 20px; border-bottom: 1px solid #bdc3c7; padding-bottom: 10px;}
        .letter-from { font-weight: bold; font-size: 1.2em; color: #e74c3c;}
        .letter-content { font-size: 1.1em; line-height: 1.6; white-space: pre-wrap; margin-top: 15px; }
        .letter-attachment { margin-top: 20px; width: 100%; border: 10px solid white; border-bottom: 40px solid white; box-shadow: 0 4px 10px rgba(0,0,0,0.2); background-color: white; display: none; }
    </style>
</head>
<body>
    <h1>Class Anonymfess | Admin Dashboard</h1>
    <div id="dashboardList"></div>
    <div id="inboxView">
        <button class="back-btn" onclick="tutupInbox()">← Kembali ke Dashboard</button>
        <h2 id="inboxTitle" style="text-align: center;"></h2>
        <div class="envelope-grid" id="envelopeGrid"></div>
    </div>
    <div id="letterViewer">
        <div class="letter-paper" id="letterPaper">
            <span class="close-btn" onclick="tutupSurat()">✖</span>
            <div class="letter-header">
                Dari: <span class="letter-from" id="suratDari"></span>
            </div>
            <div class="letter-content" id="suratIsi"></div>
            <img src="" id="suratGambar" class="letter-attachment">
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
        import { getFirestore, collection, query, where, getDocs } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBXsyqAMRvAXoWx8hR18vPQS1qnfzDY-9o",
            authDomain: "infinite-blade-472912-b2.firebaseapp.com",
            projectId: "infinite-blade-472912-b2",
            storageBucket: "infinite-blade-472912-b2.firebasestorage.app",
            messagingSenderId: "298780022614",
            appId: "1:298780022614:web:b0e454c7b58e36134ca8f7"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const daftarMahasiswa = ["Andi", "Budi", "Caca", "Deni", "Euis", "Fajar", "Gita", "Hadi", "Intan", "Joko", "Kiki", "Lala", "Maman", "Nina", "Opan", "Putri", "Qori", "Rina", "Siti", "Tono", "Umar", "Vina", "Wira", "Xander", "Yani", "Zaki"];

        function renderDashboard() {
            const dashboard = document.getElementById('dashboardList');
            dashboard.innerHTML = '';
            daftarMahasiswa.forEach(nama => {
                const box = document.createElement('div');
                box.className = 'student-box';
                box.onclick = () => bukaInbox(nama);
                box.innerHTML = `<b>${nama}</b>`;
                dashboard.appendChild(box);
            });
        }
        renderDashboard();

        window.bukaInbox = async function(namaTarget) {
            document.getElementById('dashboardList').style.display = 'none';
            document.getElementById('inboxView').style.display = 'block';
            document.getElementById('inboxTitle').innerText = `Kotak Surat - ${namaTarget}`;
            const grid = document.getElementById('envelopeGrid');
            grid.innerHTML = '<p style="text-align:center; color:#a4b0be; grid-column:1/-1;">Mencari surat...</p>';

            try {
                const q = query(collection(db, "surat_kelas"), where("tujuan", "==", namaTarget));
                const querySnapshot = await getDocs(q);
                grid.innerHTML = ''; 

                if (querySnapshot.empty) {
                    grid.innerHTML = '<p style="text-align:center; color:#a4b0be; grid-column:1/-1;">Belum ada surat rahasia buat dia.</p>';
                    return;
                }

                querySnapshot.forEach((doc) => {
                    const data = doc.data();
                    const item = document.createElement('div');
                    item.className = 'envelope-item';
                    let cls = 't-netral'; let ico = '✉️';
                    if(data.tema === 'cinta') { cls = 't-cinta'; ico = '💖'; }
                    if(data.tema === 'marah') { cls = 't-marah'; ico = '😡'; }
                    if(data.tema === 'cinta_api') { cls = 't-api'; ico = '🔥'; }
                    if(data.tema === 'sahabat') { cls = 't-sahabat'; ico = '🤝'; }
                    item.innerHTML = `<div class="css-env ${cls}"><span class="env-icon">${ico}</span></div>`;
                    item.onclick = () => bukaSurat(data);
                    grid.appendChild(item);
                });
            } catch (error) {
                console.error("Gagal ambil inbox:", error);
                grid.innerHTML = '<p style="color:red; text-align:center;">Error koneksi database!</p>';
            }
        };

        window.bukaSurat = function(data) {
            document.getElementById('inboxView').classList.add('blur-active');
            document.getElementById('suratDari').innerText = data.pengirim;
            document.getElementById('suratIsi').innerText = data.isi_pesan;
            const imgEl = document.getElementById('suratGambar');
            const paper = document.getElementById('letterPaper');
            
            // RESET MODAL
            imgEl.src = "";
            imgEl.style.display = 'none';
            const oldLink = document.getElementById('debugLink');
            if(oldLink) oldLink.remove();

            // CEK APAKAH ADA LINK GAMBAR
            if (data.url_gambar && data.url_gambar !== "") {
                console.log("Mencoba memuat gambar:", data.url_gambar);
                imgEl.src = data.url_gambar;
                imgEl.style.display = 'block';
                
                // --- FIX TERBARU BUAT NYEMBUNYIIN GAMBAR PECAH ---
                imgEl.onerror = function() {
                    console.warn("Gambar rusak/error. Disembunyikan.");
                    imgEl.style.display = 'none'; // Sembunyiin gambarnya biar nggak ngerusak pemandangan
                };
                
                // Tambahin tombol darurat (fall back)
                const debugBtn = document.createElement('a');
                debugBtn.href = data.url_gambar;
                debugBtn.target = "_blank";
                debugBtn.innerText = "🔗 Klik di sini kalau gambar di atas nggak muncul";
                debugBtn.style = "display:block; font-size:11px; color:#e74c3c; margin-top:10px; text-decoration:none; text-align:center;";
                debugBtn.id = "debugLink";
                imgEl.after(debugBtn);
            }

            document.getElementById('letterViewer').style.display = 'flex';
            setTimeout(() => { paper.classList.add('open'); }, 50);
        };

        window.tutupSurat = function() {
            const paper = document.getElementById('letterPaper');
            paper.classList.remove('open'); 
            document.getElementById('inboxView').classList.remove('blur-active');
            setTimeout(() => { document.getElementById('letterViewer').style.display = 'none'; }, 600); 
        };

        window.tutupInbox = function() {
            document.getElementById('inboxView').style.display = 'none';
            document.getElementById('dashboardList').style.display = 'grid';
        };
    </script>
</body>
</html>
