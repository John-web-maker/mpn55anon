<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Class Anonymfess | Dashboard Admin</title>
    <style>
        body, html { height: 100%; margin: 0; font-family: 'Segoe UI', sans-serif; background: #1a2530; color: #ecf0f1; padding: 20px; box-sizing: border-box; }
        h1 { text-align: center; text-transform: uppercase; font-size: 1.5em; margin-bottom: 30px; }
        #dashboardList { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 15px; }
        .student-box { background: rgba(255, 255, 255, 0.05); border-radius: 12px; padding: 20px; border: 1px solid rgba(255, 255, 255, 0.1); text-align: center; cursor: pointer; transition: 0.3s; }
        .student-box:hover { transform: translateY(-5px); background: rgba(255, 255, 255, 0.1); }
        #inboxView { display: none; }
        .back-btn { background: rgba(255, 255, 255, 0.1); border: none; border-radius: 8px; color: #ecf0f1; padding: 10px 20px; cursor: pointer; margin-bottom: 20px; }
        .envelope-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 20px; }
        .css-env { position: relative; width: 100%; padding-top: 75%; border-radius: 8px; box-shadow: 0 5px 15px rgba(0,0,0,0.4); overflow: hidden; cursor: pointer;}
        .css-env::before { content: ''; position: absolute; top: 0; left: 0; right: 0; bottom: 0; background: linear-gradient(135deg, rgba(255,255,255,0.3) 0%, rgba(0,0,0,0.1) 100%); clip-path: polygon(0 0, 100% 0, 50% 50%); z-index: 1; }
        .env-icon { position: absolute; font-size: 2rem; z-index: 2; top: 50%; left: 50%; transform: translate(-50%, -10%); }
        .t-netral { background-color: #d4b895; }
        .t-cinta { background-color: #ffb6c1; }
        .t-marah { background-color: #2c3e50; border: 2px solid #e74c3c; box-sizing: border-box;}
        .t-api { background: linear-gradient(135deg, #ff416c, #ff4b2b); }
        .t-sahabat { background-color: #fde047; }
        #letterViewer { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 100; justify-content: center; align-items: center; background: rgba(0,0,0,0.8); backdrop-filter: blur(5px); }
        .letter-paper { background-color: #fdfbf7; color: #2c3e50; border-radius: 10px; padding: 30px; width: 90%; max-width: 500px; position: relative; }
        .close-btn { position: absolute; top: 10px; right: 15px; font-size: 1.5em; cursor: pointer; color: #7f8c8d; }
        .letter-attachment { margin-top: 15px; width: 100%; border: 5px solid white; box-shadow: 0 2px 5px rgba(0,0,0,0.2); }
    </style>
</head>
<body>
    <h1>Dashboard Admin</h1>
    <div id="dashboardList"></div>
    <div id="inboxView">
        <button class="back-btn" onclick="tutupInbox()">← Kembali</button>
        <h2 id="inboxTitle" style="text-align: center;"></h2>
        <div class="envelope-grid" id="envelopeGrid"></div>
    </div>
    <div id="letterViewer">
        <div class="letter-paper">
            <span class="close-btn" onclick="tutupSurat()">✖</span>
            <p><b>Dari:</b> <span id="suratDari"></span></p>
            <p id="suratIsi"></p>
            <img src="" id="suratGambar" class="letter-attachment" style="display:none">
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
        import { getFirestore, collection, query, where, getDocs } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBXsyqAMRvAXoWx8hR18vPQS1qnfzDY-9o",
            authDomain: "infinite-blade-472912-b2.firebaseapp.com",
            projectId: "infinite-blade-472912-b2",
            storageBucket: "infinite-blade-472912-b2.firebasestorage.app",
            messagingSenderId: "298780022614",
            appId: "1:298780022614:web:b0e454c7b58e36134ca8f7"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const names = ["Andi", "Budi", "Caca", "Deni", "Euis", "Fajar", "Gita", "Hadi", "Intan", "Joko", "Kiki", "Lala", "Maman", "Nina", "Opan", "Putri", "Qori", "Rina", "Siti", "Tono", "Umar", "Vina", "Wira", "Xander", "Yani", "Zaki"];

        function renderDashboard() {
            const list = document.getElementById('dashboardList');
            names.forEach(n => {
                const box = document.createElement('div');
                box.className = 'student-box';
                box.innerHTML = `<b>${n}</b>`;
                box.onclick = () => bukaInbox(n);
                list.appendChild(box);
            });
        }
        renderDashboard();

        window.bukaInbox = async (nama) => {
            document.getElementById('dashboardList').style.display = 'none';
            document.getElementById('inboxView').style.display = 'block';
            document.getElementById('inboxTitle').innerText = `Surat buat ${nama}`;
            const grid = document.getElementById('envelopeGrid');
            grid.innerHTML = "Mencari...";
            const q = query(collection(db, "surat_kelas"), where("tujuan", "==", nama));
            const snap = await getDocs(q);
            grid.innerHTML = "";
            snap.forEach(doc => {
                const d = doc.data();
                const div = document.createElement('div');
                let cls = 't-netral'; let ico = '✉️';
                if(d.tema === 'cinta') { cls = 't-cinta'; ico = '💖'; }
                if(d.tema === 'marah') { cls = 't-marah'; ico = '😡'; }
                if(d.tema === 'cinta_api') { cls = 't-api'; ico = '🔥'; }
                if(d.tema === 'sahabat') { cls = 't-sahabat'; ico = '🤝'; }
                div.innerHTML = `<div class="css-env ${cls}"><span class="env-icon">${ico}</span></div>`;
                div.onclick = () => bukaSurat(d);
                grid.appendChild(div);
            });
        };

        window.bukaSurat = (d) => {
            document.getElementById('suratDari').innerText = d.pengirim;
            document.getElementById('suratIsi').innerText = d.isi_pesan;
            const img = document.getElementById('suratGambar');
            if(d.url_gambar) { img.src = d.url_gambar; img.style.display = "block"; }
            else { img.style.display = "none"; }
            document.getElementById('letterViewer').style.display = "flex";
        };

        window.tutupSurat = () => { document.getElementById('letterViewer').style.display = "none"; };
        window.tutupInbox = () => { location.reload(); };
    </script>
</body>
</html>
