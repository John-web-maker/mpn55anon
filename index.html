<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Class Anonymfess | Gerbang Utama</title>
    <style>
        body, html { height: 100%; margin: 0; font-family: 'Segoe UI', sans-serif; background: radial-gradient(circle, #2d3e50 0%, #1a2530 100%); overflow: hidden; display: flex; justify-content: center; align-items: center; }
        .bg-image { background-image: url('image_0.png'); filter: grayscale(100%) brightness(50%); opacity: 0.15; position: absolute; width: 100%; height: 100%; background-size: cover; background-position: center; z-index: -1; }
        .login-container { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(10px); border-radius: 20px; padding: 40px; width: 90%; max-width: 400px; text-align: center; border: 1px solid rgba(255, 255, 255, 0.1); box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3); color: #ecf0f1; }
        .envelope-icon { font-size: 3em; margin-bottom: 15px; }
        h1 { font-size: 1.8em; margin-bottom: 5px; text-transform: uppercase; letter-spacing: 1px; }
        p.subtitle { color: #a4b0be; font-size: 0.9em; margin-bottom: 30px; }
        input { width: 100%; padding: 12px; margin-bottom: 15px; background: rgba(255, 255, 255, 0.1); border: 1px solid rgba(255, 255, 255, 0.2); border-radius: 8px; color: #ecf0f1; font-size: 1em; box-sizing: border-box; }
        .btn { width: 100%; padding: 12px; border: none; border-radius: 8px; font-size: 1.1em; cursor: pointer; transition: 0.3s; margin-bottom: 15px; font-weight: 600; }
        .btn-admin { background-color: #34495e; color: #ecf0f1; }
        .btn-admin:hover { background-color: #4b6584; }
        .btn-user { background-color: transparent; border: 2px solid #57606f; color: #a4b0be; text-transform: uppercase; }
        .btn-user:hover { background-color: #57606f; color: #ecf0f1; }
        .separator { color: #7f8c8d; font-size: 0.9em; margin: 10px 0 20px 0; display: flex; align-items: center; justify-content: center; }
        .separator::before, .separator::after { content: ''; flex: 1; height: 1px; background: rgba(255, 255, 255, 0.1); margin: 0 10px; }
        .footer { position: absolute; bottom: 10px; width: 100%; text-align: center; color: #7f8c8d; font-size: 0.8em; }
    </style>
</head>
<body>
    <div class="bg-image"></div>
    <div class="login-container">
        <div class="envelope-icon">✉️</div>
        <h1>Class Anonymfess</h1>
        <p class="subtitle">Kirim pesan anonim ke teman kelasmu.</p>
        <form id="loginForm">
            <input type="email" id="email" placeholder="Username (@admin.com)" required>
            <input type="password" id="password" placeholder="Password" required>
            <button type="submit" class="btn btn-admin">Masuk Admin</button>
        </form>
        <p id="errorMsg" style="color: #e74c3c; font-size: 0.8em; display: none; margin-top:-10px;">Login gagal! Cek lagi.</p>
        <div class="separator">ATAU</div>
        <a href="user.html" style="text-decoration: none;"><button class="btn btn-user" type="button">Kirim Pesan (Anonim)</button></a>
    </div>
    <div class="footer">&copy; 2026 Class of ... Anonymfess Project.</div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBXsyqAMRvAXoWx8hR18vPQS1qnfzDY-9o",
            authDomain: "infinite-blade-472912-b2.firebaseapp.com",
            projectId: "infinite-blade-472912-b2",
            storageBucket: "infinite-blade-472912-b2.firebasestorage.app",
            messagingSenderId: "298780022614",
            appId: "1:298780022614:web:b0e454c7b58e36134ca8f7"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        document.getElementById('loginForm').addEventListener('submit', (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            signInWithEmailAndPassword(auth, email, password)
                .then(() => {
                    window.location.href = "admin.html"; 
                })
                .catch((error) => {
                    document.getElementById('errorMsg').style.display = 'block';
                    console.error("Gagal bos:", error.message);
                });
        });
    </script>
</body>
</html>
