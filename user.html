<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Class Anonymfess | Kirim Pesan</title>
    <style>
        body, html { height: 100%; margin: 0; font-family: 'Segoe UI', sans-serif; background: radial-gradient(circle, #2d3e50 0%, #1a2530 100%); display: flex; justify-content: center; align-items: center; color: #ecf0f1; }
        .user-container { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(10px); border-radius: 20px; padding: 30px; width: 90%; max-width: 500px; border: 1px solid rgba(255, 255, 255, 0.1); box-sizing: border-box; height: 95vh; overflow-y: auto; }
        h1 { text-align: center; text-transform: uppercase; font-size: 1.5em; margin-bottom: 20px; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; color: #a4b0be; font-size: 0.9em; }
        input, textarea, select { width: 100%; padding: 12px; background: rgba(255, 255, 255, 0.1); border: 1px solid rgba(255, 255, 255, 0.2); border-radius: 8px; color: #ecf0f1; font-size: 1em; box-sizing: border-box; }
        
        /* CSS AMPLOP WARNA-WARNI */
        .theme-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; margin-top: 10px; }
        .theme-item { border: 2px solid transparent; border-radius: 8px; cursor: pointer; text-align: center; transition: 0.3s; padding: 5px; }
        .theme-item.selected { border-color: #3498db; background: rgba(52, 152, 219, 0.2); }
        .theme-name { font-size: 0.7em; display: block; margin-top: 5px; }
        .css-env { position: relative; width: 100%; padding-top: 75%; border-radius: 5px; box-shadow: 0 4px 6px rgba(0,0,0,0.3); overflow: hidden; }
        .css-env::before { content: ''; position: absolute; top: 0; left: 0; right: 0; bottom: 0; background: linear-gradient(135deg, rgba(255,255,255,0.3) 0%, rgba(0,0,0,0.1) 100%); clip-path: polygon(0 0, 100% 0, 50% 50%); z-index: 1; }
        .env-icon { position: absolute; font-size: 1.5rem; z-index: 2; top: 50%; left: 50%; transform: translate(-50%, -10%); }
        .t-netral { background-color: #d4b895; }
        .t-cinta { background-color: #ffb6c1; }
        .t-marah { background-color: #2c3e50; border: 1px solid #e74c3c; }
        .t-api { background: linear-gradient(135deg, #ff416c, #ff4b2b); }
        .t-sahabat { background-color: #fde047; }

        .btn-send { width: 100%; padding: 15px; margin-top: 20px; background: #3498db; border: none; border-radius: 8px; color: white; font-weight: bold; cursor: pointer; font-size: 1.1em; transition: 0.3s; }
        #status { text-align: center; margin-top: 10px; font-size: 0.9em; color: #f1c40f; }
    </style>
</head>
<body>
    <div class="user-container">
        <h1>Tulis Pesan Rahasia</h1>
        <form id="fessForm">
            <div class="form-group">
                <label>Kepada:</label>
                <select id="tujuan" required>
                    <option value="">Pilih Nama...</option>
                    <script>
                        const namaNama = ["Andi", "Budi", "Caca", "Deni", "Euis", "Fajar", "Gita", "Hadi", "Intan", "Joko", "Kiki", "Lala", "Maman", "Nina", "Opan", "Putri", "Qori", "Rina", "Siti", "Tono", "Umar", "Vina", "Wira", "Xander", "Yani", "Zaki"];
                        namaNama.forEach(n => document.write(`<option value="${n}">${n}</option>`));
                    </script>
                </select>
            </div>
            <div class="form-group">
                <label>Dari:</label>
                <input type="text" id="pengirim" placeholder="Nama samaran..." required>
            </div>
            <div class="form-group">
                <label>Isi Pesan:</label>
                <textarea id="isi" rows="4" required></textarea>
            </div>
            <div class="form-group">
                <label>Lampirkan Gambar (Maks 10MB):</label>
                <input type="file" id="gambar" accept="image/*">
            </div>
            <div class="form-group">
                <label>Pilih Tema:</label>
                <div class="theme-grid">
                    <div class="theme-item selected" data-theme="netral"><div class="css-env t-netral"><span class="env-icon">✉️</span></div><span class="theme-name">Netral</span></div>
                    <div class="theme-item" data-theme="cinta"><div class="css-env t-cinta"><span class="env-icon">💖</span></div><span class="theme-name">Cinta</span></div>
                    <div class="theme-item" data-theme="marah"><div class="css-env t-marah"><span class="env-icon">😡</span></div><span class="theme-name">Marah</span></div>
                    <div class="theme-item" data-theme="cinta_api"><div class="css-env t-api"><span class="env-icon">🔥</span></div><span class="theme-name">Api</span></div>
                    <div class="theme-item" data-theme="sahabat"><div class="css-env t-sahabat"><span class="env-icon">🤝</span></div><span class="theme-name">Bestie</span></div>
                </div>
            </div>
            <button type="submit" class="btn-send" id="btnKirim">KIRIM PESAN</button>
            <div id="status"></div>
        </form>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
        import { getFirestore, collection, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBXsyqAMRvAXoWx8hR18vPQS1qnfzDY-9o",
            authDomain: "infinite-blade-472912-b2.firebaseapp.com",
            projectId: "infinite-blade-472912-b2",
            storageBucket: "infinite-blade-472912-b2.firebasestorage.app",
            messagingSenderId: "298780022614",
            appId: "1:298780022614:web:b0e454c7b58e36134ca8f7"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const IMGBB_KEY = "69bbdb9d386d1267c8f6a1b0c5791cd0";

        let temaTerpilih = "netral";
        document.querySelectorAll('.theme-item').forEach(item => {
            item.onclick = () => {
                document.querySelector('.theme-item.selected').classList.remove('selected');
                item.classList.add('selected');
                temaTerpilih = item.getAttribute('data-theme');
            };
        });

        document.getElementById('fessForm').onsubmit = async (e) => {
            e.preventDefault();
            const btn = document.getElementById('btnKirim');
            const stat = document.getElementById('status');
            const fileInput = document.getElementById('gambar');
            
            btn.disabled = true;
            stat.innerText = "Sabar, lagi nge-upload gambar...";

            let finalUrl = "";

            if (fileInput.files.length > 0) {
                const formData = new FormData();
                formData.append("image", fileInput.files[0]);

                try {
                    const res = await fetch(`https://api.imgbb.com/1/upload?key=${IMGBB_KEY}`, {
                        method: "POST",
                        body: formData
                    });
                    const result = await res.json();
                    if (result.success) { finalUrl = result.data.url; }
                } catch (err) { console.error("ImgBB Error:", err); }
            }

            try {
                stat.innerText = "Lagi nyimpen pesan...";
                await addDoc(collection(db, "surat_kelas"), {
                    tujuan: document.getElementById('tujuan').value,
                    pengirim: document.getElementById('pengirim').value,
                    isi_pesan: document.getElementById('isi').value,
                    tema: temaTerpilih,
                    url_gambar: finalUrl,
                    waktu: serverTimestamp()
                });
                alert("MANTAP! PESAN RAHASIA TERKIRIM!");
                location.reload();
            } catch (err) { alert("Gagal kirim!"); btn.disabled = false; }
        };
    </script>
</body>
</html>
