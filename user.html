<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kirim Pesan | MPN55</title>
    <style>
        body, html { min-height: 100vh; margin: 0; font-family: 'Segoe UI', sans-serif; background: #1a2530; color: #ecf0f1; display: flex; justify-content: center; align-items: center; }
        .bg-image { 
            background-image: url('image_0.png'); 
            filter: grayscale(100%) brightness(35%); 
            opacity: 0.3; position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; 
            background-size: cover; background-position: center; 
            z-index: 0; pointer-events: none;
        }
        .user-container { 
            background: rgba(255, 255, 255, 0.07); backdrop-filter: blur(15px); 
            border-radius: 20px; padding: 25px; width: 85%; max-width: 400px; 
            border: 1px solid rgba(255, 255, 255, 0.1); box-sizing: border-box; 
            margin: 20px 0; position: relative; z-index: 10;
        }
        h1 { text-align: center; font-size: 1.3em; margin-bottom: 20px; letter-spacing: 1px; }
        label { display: block; margin-bottom: 5px; color: #a4b0be; font-size: 0.8em; }
        input, textarea, select { width: 100%; padding: 12px; background: rgba(0,0,0,0.3); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 8px; color: white; font-size: 0.9em; box-sizing: border-box; margin-bottom: 15px; }
        .theme-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; margin-bottom: 20px; }
        .theme-item { border: 2px solid transparent; border-radius: 8px; cursor: pointer; padding: 5px; }
        .theme-item.selected { border-color: #3498db; background: rgba(52, 152, 219, 0.2); }
        .css-env { width: 100%; padding-top: 75%; border-radius: 5px; box-shadow: 0 4px 6px rgba(0,0,0,0.3); }
        .btn-send { width: 100%; padding: 15px; background: #3498db; border: none; border-radius: 8px; color: white; font-weight: bold; cursor: pointer; font-size: 1em; }
        #status { text-align: center; margin-top: 10px; font-size: 0.8em; color: #f1c40f; font-weight: bold; }
    </style>
</head>
<body>
    <div class="bg-image"></div>
    <div class="user-container">
        <h1>KIRIM RAHASIA 🚀</h1>
        <form id="fessForm">
            <label>Untuk Teman Kelas:</label>
            <select id="tujuan" required>
                <option value="">Pilih Nama...</option>
                <script>
                    const names = ["ADHIATAMA DWIKA NUGRAHA", "AFFANI HAYU PRABANINGTYAS", "AMELIA AMRETHA CANDRA", "ANDI PANGERAN MAULANA IBRAHIM", "ARIN VANIA INDRIATI WIDODO", "BANA HIBRIZI NAFIUDIN", "DIAZ AGUNG FATAHILLAH", "DIFNA AULYA SYAFITRI", "FERNANDA PRIMA YUDHA", "GABRIELA HAMIDA PUTRI", "HANS YURI CARNAGI GINTING", "JOANELVI SHANNOEL", "TANDELOKA DESTARA YUDHA", "MEIVA ANASTASYA BR GINTING", "MOCH. AMIL LABIB MAKARIM", "MUHAMMAD RIFQI RASYIDDIN", "NI MADE AUDY ANGELINA SUDARSANA", "NIZAR EKA MATALIPUTRI", "PUTRI SATRIA WIBAWA PANGARIBUAN", "RAIHAN ARYA RIDHAWAN", "RISCHA SITANGGANG", "RIZAL YEPTA PUTRA SIBARANI", "RONI NUR HIDAYAT", "SHERLYANA FITRIA DESWANTARI", "TOTTI ARIIQ RACHYANDY", "YOINA DOVERIANINGTYAS PARDOSI"];
                    names.sort().forEach(n => document.write(`<option value="${n}">${n}</option>`));
                </script>
            </select>
            <input type="text" id="pengirim" placeholder="Dari (Nama Samaran)" required>
            <textarea id="isi" rows="4" placeholder="Ketik pesan rahasiamu..." required></textarea>
            <label>Lampirkan Foto (Opsional):</label>
            <input type="file" id="gambar" accept="image/*">
            <div class="theme-grid">
                <div class="theme-item selected" data-theme="netral"><div class="css-env" style="background:#d4b895"></div></div>
                <div class="theme-item" data-theme="cinta"><div class="css-env" style="background:#ffb6c1"></div></div>
                <div class="theme-item" data-theme="marah"><div class="css-env" style="background:#2c3e50"></div></div>
                <div class="theme-item" data-theme="api"><div class="css-env" style="background:linear-gradient(135deg, #ff416c, #ff4b2b)"></div></div>
                <div class="theme-item" data-theme="sahabat"><div class="css-env" style="background:#fde047"></div></div>
            </div>
            <button type="submit" class="btn-send" id="btnKirim">KIRIM PESAN</button>
            <div id="status"></div>
        </form>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
        import { getFirestore, collection, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";
        const firebaseConfig = {
            apiKey: "AIzaSyBXsyqAMRvAXoWx8hR18vPQS1qnfzDY-9o",
            authDomain: "infinite-blade-472912-b2.firebaseapp.com",
            projectId: "infinite-blade-472912-b2",
            storageBucket: "infinite-blade-472912-b2.firebasestorage.app",
            messagingSenderId: "298780022614",
            appId: "1:298780022614:web:b0e454c7b58e36134ca8f7"
        };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const CLOUD_NAME = "dj4tqz7mp";
        const UPLOAD_PRESET = "jyvupkc2";

        let tema = "netral";
        document.querySelectorAll('.theme-item').forEach(i => {
            i.onclick = () => { document.querySelector('.theme-item.selected').classList.remove('selected'); i.classList.add('selected'); tema = i.dataset.theme; };
        });

        document.getElementById('fessForm').onsubmit = async (e) => {
            e.preventDefault();
            const btn = document.getElementById('btnKirim');
            const stat = document.getElementById('status');
            btn.disabled = true; stat.innerText = "⏳ Mengirim...";

            let url = "";
            const file = document.getElementById('gambar').files[0];
            if (file) {
                const fd = new FormData(); fd.append("file", file); fd.append("upload_preset", UPLOAD_PRESET);
                try {
                    const res = await fetch(`https://api.cloudinary.com/v1_1/${CLOUD_NAME}/image/upload`, { method: "POST", body: fd });
                    const json = await res.json(); url = json.secure_url;
                } catch { alert("Gagal Upload!"); btn.disabled = false; return; }
            }

            try {
                await addDoc(collection(db, "surat_kelas"), {
                    tujuan: document.getElementById('tujuan').value,
                    pengirim: document.getElementById('pengirim').value,
                    isi_pesan: document.getElementById('isi').value,
                    tema: tema, url_gambar: url, waktu: serverTimestamp()
                });
                alert("TERKIRIM!"); location.reload();
            } catch { alert("Gagal Kirim!"); btn.disabled = false; }
        };
    </script>
</body>
</html>
