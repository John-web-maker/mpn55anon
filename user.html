<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerbang Utama | MPN55</title>
    <style>
        body, html { height: 100%; margin: 0; font-family: 'Segoe UI', sans-serif; background: #1a2530; display: flex; justify-content: center; align-items: center; overflow: hidden; }
        .bg-image { 
            background-image: url('image_0.png'); 
            filter: grayscale(100%) brightness(35%); 
            opacity: 0.3; position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; 
            background-size: cover; background-position: center; z-index: -1; 
        }
        .login-container { 
            background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(10px); 
            border-radius: 20px; padding: 40px; width: 85%; max-width: 380px; text-align: center; 
            border: 1px solid rgba(255, 255, 255, 0.1); box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5); color: #ecf0f1; 
        }
        input { width: 100%; padding: 12px; margin-bottom: 15px; background: rgba(255, 255, 255, 0.1); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 8px; color: #ecf0f1; box-sizing: border-box; }
        .btn { width: 100%; padding: 12px; border: none; border-radius: 8px; font-size: 1em; cursor: pointer; font-weight: 600; text-decoration: none; display: block; margin-bottom: 15px; }
        .btn-admin { background: #3498db; color: white; }
        .btn-user { background: transparent; border: 2px solid #57606f; color: #a4b0be; }
        .separator { color: #7f8c8d; font-size: 0.8em; margin: 10px 0 20px 0; }
    </style>
</head>
<body>
    <div class="bg-image"></div>
    <div class="login-container">
        <h1 style="font-size: 1.5em; letter-spacing: 2px;">MPN55 FESS</h1>
        <p style="color: #a4b0be; font-size: 0.8em; margin-bottom: 30px;">Kirim pesan anonim ke teman kelas.</p>
        <form id="loginForm">
            <input type="email" id="email" placeholder="Email Admin" required>
            <input type="password" id="password" placeholder="Password" required>
            <button type="submit" class="btn btn-admin">MASUK ADMIN</button>
        </form>
        <div class="separator">───── ATAU ─────</div>
        <a href="user.html" class="btn btn-user">TULIS PESAN (ANONIM)</a>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-auth.js";
        const firebaseConfig = {
            apiKey: "AIzaSyBXsyqAMRvAXoWx8hR18vPQS1qnfzDY-9o",
            authDomain: "infinite-blade-472912-b2.firebaseapp.com",
            projectId: "infinite-blade-472912-b2",
            storageBucket: "infinite-blade-472912-b2.firebasestorage.app",
            messagingSenderId: "298780022614",
            appId: "1:298780022614:web:b0e454c7b58e36134ca8f7"
        };
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        document.getElementById('loginForm').addEventListener('submit', (e) => {
            e.preventDefault();
            signInWithEmailAndPassword(auth, document.getElementById('email').value, document.getElementById('password').value)
                .then(() => { window.location.href = "admin.html"; })
                .catch(() => { alert("Login Gagal!"); });
        });
    </script>
</body>
</html>
